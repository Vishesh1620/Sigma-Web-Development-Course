<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Image</title>
    <style>
        .card {
            width: 400px;
            height: 600px;

            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .capsule {
            display: inline-block;
            padding: 6px 14px;
            background-color: #c0bdbd;
            color: rgb(0, 0, 0);
            border-radius: 999px;
            font-size: 14px;

            font-family: Arial, sans-serif;
        }

        .capsule1 {
            display: inline-block;
            padding: 6px 14px;
            background-color: #c0bdbd;
            color: rgb(0, 0, 0);
            border-radius: 999px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        h2 {
            padding: 10px;
        }
        .capsule2 {
            display: inline-block;
            padding: 6px 14px;
            background-color: #d0f2ff;
            color: rgb(17, 99, 222);
            border-radius: 999px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            /* position: absolute;
            bottom: px;
            left: 60px; */
        }
        p{
            padding: 10px;
        }
    </style>
</head>

<body>
    <!-- Card.png is a file which contains a card Image. Write html and css code to design this card -->
    <div class="card">

            </div>

    </div>
</body>

</html>
