<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Let's Learn it</title>
</head>
<body>
    <h1>Form to Apply for Sigma Web Development Course</h1>
    <form action="">
        <div><label for="name">Enter your username</label>
        <input type="text" name="name" id="name" placeholder="Enter your name" autofocus>
        
    
        </div>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <div>
            <input type="checkbox" name="subscribe" id="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
        </div>
        <div>
            <label for="comment">Enter Your Comment</label>
            <textarea name="comment" rows="6" cols="50" id="comment"></textarea>
        </div>
        <div>
            <label for="course">Select Course</label>
            <select name="course" id="course">
                <option value="">--Select a course--</option>
                <option value="web-development">Web Development</option>
                <option value="data-science">Data Science</option>
                <option value="machine-learning">Machine Learning</option>
            </select>
        </div>
    </form>
</body>
</html>
