<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 35px;
            box-shadow: 5px 15px 5px #66d102;
            border-radius: 8px;
            outline: 1px solid #e84a07;
            outline-offset: 20px;
        }
        .text-element{text-shadow: 2px 2px 5px #e84a07;

        }
    </style>
</head>

<body>
    <div class="box">
        I am a box
    </div>
    <p class="text-element">
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Sit minima hic, perspiciatis sint qui impedit
        voluptatum quas mollitia quidem, error quo porro libero nam vitae!
    </p>
</body>

</html>
